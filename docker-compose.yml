version: '3.8'

services:
  app:
    build: .
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SURREAL_EXTERNAL=true
      - SURREAL_HOST=surrealdb
      - SURREAL_PORT=8000
    depends_on:
      - surrealdb
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:latest
    ports:
      - "8000:8000"
    command: start --user root --pass root surrealkv://surreal.db
    volumes:
      - surreal_data:/surreal.db
    restart: unless-stopped

  caddy:
    image: caddy:latest
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  surreal_data:
  caddy_data:
  caddy_config:
